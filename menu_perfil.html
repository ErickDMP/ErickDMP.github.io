      <h1 id="saludo">Hola 👋</h1>
  <button id="logout">Cerrar sesión</button>

  <script type="module">
    import { supabase } from './supabaseziha.js';

    // CON ESTO SE RECUPERA EL NOMBRE DEL USUARIO
    const user = JSON.parse(localStorage.getItem('user'));

    // CON ESTO SI NO HAY USUARIP REGRESAMOS A ACCEDER
    if (!user) {
      alert('Debes iniciar sesión primero');
      window.location.href = 'ACCEDER.html';
    } else {
      // CON ESTO EL USER DETRO DE LAS LLAVES LLAMARÍA AL NOMBRE DEL USUARIO, EL MAIL A SU CORREO, COMO NO PUSE EN EL REGISTRO EL NOMBRE DEL USUARIO NO VA A SALIR
      document.getElementById('saludo').textContent = `Hola ${user.email} 👋`;
    }

    // Cerrar sesión
    document.getElementById('logout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      localStorage.removeItem('user');
      alert('👋 Sesión cerrada');
      window.location.href = 'ACCEDER.html';
    });
  </script>
